<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Large Insider Trades</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">SEC Form 4 filings</p>
          <h1>Large insider trades</h1>
        </div>
        <a class="nav-link" href="/">All trades</a>
      </section>

      <section class="summary-grid" aria-label="Summary">
        <div class="metric">
          <span class="label">Large trades</span>
          <strong id="largeCount">-</strong>
        </div>
        <div class="metric">
          <span class="label">Purchase value</span>
          <strong id="purchaseValue">-</strong>
        </div>
        <div class="metric">
          <span class="label">Sale value</span>
          <strong id="saleValue">-</strong>
        </div>
        <div class="metric">
          <span class="label">Threshold</span>
          <strong id="thresholdValue">$5M</strong>
        </div>
      </section>

      <section class="controls large-controls" aria-label="Filters">
        <label>
          <span>Search</span>
          <input id="search" type="search" placeholder="Ticker, issuer, insider">
        </label>
        <label>
          <span>Range</span>
          <select id="rangeFilter">
            <option value="31">Monthly</option>
            <option value="93" selected>3 months</option>
            <option value="180">6 months</option>
          </select>
        </label>
        <label>
          <span>Minimum value</span>
          <input id="threshold" type="number" min="1000000" step="1000000" value="5000000">
        </label>
      </section>

      <section class="table-wrap" aria-live="polite">
        <div id="status" class="status">Loading large trades...</div>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Ticker</th>
              <th>Issuer</th>
              <th>Insider</th>
              <th>Action</th>
              <th class="numeric">Shares</th>
              <th class="numeric">Price</th>
              <th class="numeric">Value</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="transactions"></tbody>
        </table>
      </section>
    </main>
    <script src="/large.js" type="module"></script>
  </body>
</html>
